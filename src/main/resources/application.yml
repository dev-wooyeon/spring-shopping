spring:
  application:
    name: spring-shopping
  datasource:
    url: jdbc:h2:mem:spring-shopping;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  auth:
    jwt-secret: ${JWT_SECRET:test-only-jwt-secret-change-in-prod-32chars-min}
    token-validity-minutes: 30
